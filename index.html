<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enzy ❤️ Sattiw</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #ff4b91, #ff6b9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container{
            text-align: center;
            animation: fade 2s ease-in-out;
        }

        /* Definisi animasi fade */
        @keyframes fade {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        h1{
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p{
            font-size: 1.3rem;
            opacity: 0.9;
        }

        /* Efek berdenyut pada hati */
        .heart{
            animation: beat 1.5s infinite;
            display: inline-block;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enzy <span class="heart">❤️</span> Sattiw</h1>
        <p>Selamat menikmati halaman ini ✨</p>
    </div>
</body>
</html>
